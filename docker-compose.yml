# Сборка в GitHub Actions → ghcr.io. Если в стеке не задашь IMAGE — подставится образ этого репо.
# Переопределение: IMAGE=ghcr.io/другой/образ:тег

services:
  bot:
    image: ${IMAGE:-ghcr.io/sereza111/vpn_entrepreneur:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Персистентное хранилище привязок подписок (data/xui-links.json),
      # чтобы после redeploy связи Telegram ↔ XUI не терялись.
      - ./data:/app/data
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      BOT_TOKEN: ${BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET}
      PRIMARY_SUBSCRIPTION_SOURCE: xui
      # XUI_BASE_URL — хост подписки (обычно порт из «Порт подписки», напр. :2096).
      # XUI_PANEL_BASE_URL — хост панели + при необходимости секретный префикс (напр. https://ip:48408/8dFlsHsLZMTgKsrUhd), иначе POST /login даст 404.
      XUI_BASE_URL: ${XUI_BASE_URL}
      XUI_PANEL_BASE_URL: ${XUI_PANEL_BASE_URL}
      XUI_WEB_BASE_PATH: ${XUI_WEB_BASE_PATH}
      XUI_USERNAME: ${XUI_USERNAME}
      XUI_PASSWORD: ${XUI_PASSWORD}
      XUI_INBOUND_ID: ${XUI_INBOUND_ID}
      XUI_SUB_PATH: ${XUI_SUB_PATH:-/sub}
      XUI_INSECURE_TLS: ${XUI_INSECURE_TLS:-0}
      # XUI_CLIENT_REMARK_TEMPLATE: "{subscriptionTitle} · @{username}"
      XUI_CLIENT_DISPLAY_SUFFIX: ${XUI_CLIENT_DISPLAY_SUFFIX:-🌐}
      PROXY_SERVERS_JSON: ${PROXY_SERVERS_JSON:-[]}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      PAYMENT_CHECKOUT_URL_TEMPLATE: ${PAYMENT_CHECKOUT_URL_TEMPLATE:-}
      PAYMENT_DEFAULT_PRODUCT_CODE: ${PAYMENT_DEFAULT_PRODUCT_CODE:-vpn_30}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TEST_GRANT_ENABLED: ${TEST_GRANT_ENABLED:-0}
      TELEGRAM_SKIP_WEBHOOK_SETUP: ${TELEGRAM_SKIP_WEBHOOK_SETUP:-0}
      TELEGRAM_WEBHOOK_RETRIES: ${TELEGRAM_WEBHOOK_RETRIES:-12}
      TELEGRAM_WEBHOOK_RETRY_MS: ${TELEGRAM_WEBHOOK_RETRY_MS:-5000}
      TELEGRAM_WEBHOOK_RETRY_INTERVAL_MS: ${TELEGRAM_WEBHOOK_RETRY_INTERVAL_MS:-300000}
      NOCOBASE_BASE_URL: ${NOCOBASE_BASE_URL:-}
      NOCOBASE_API_TOKEN: ${NOCOBASE_API_TOKEN:-}
      NOCOBASE_ACCOUNT: ${NOCOBASE_ACCOUNT:-}
      NOCOBASE_PASSWORD: ${NOCOBASE_PASSWORD:-}
      NOCOBASE_COLLECTION_CUSTOMERS: ${NOCOBASE_COLLECTION_CUSTOMERS:-customers}
      NOCOBASE_COLLECTION_ORDERS: ${NOCOBASE_COLLECTION_ORDERS:-orders}
      NOCOBASE_COLLECTION_PRODUCTS: ${NOCOBASE_COLLECTION_PRODUCTS:-products}
      NOCOBASE_COLLECTION_PROXY_INSTANCES: ${NOCOBASE_COLLECTION_PROXY_INSTANCES:-proxy_instances}
      NOCOBASE_COLLECTION_SUBSCRIPTION_BRANDING: ${NOCOBASE_COLLECTION_SUBSCRIPTION_BRANDING:-subscription_branding}
