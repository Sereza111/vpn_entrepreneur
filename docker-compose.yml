# Portainer: задай IMAGE = образ из GitHub Packages после первого успешного Actions.
# Пример: IMAGE=ghcr.io/ivanivanov/tg-vpn-subscription-bot:latest
# Сборка идёт в GitHub Actions (.github/workflows/docker-publish.yml), не на сервере.

services:
  bot:
    image: ${IMAGE}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      BOT_TOKEN: ${BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET}
      REMNAWAVE_BASE_URL: ${REMNAWAVE_BASE_URL}
      REMNAWAVE_ACCESS_TOKEN: ${REMNAWAVE_ACCESS_TOKEN}
      REMNAWAVE_USERNAME: ${REMNAWAVE_USERNAME}
      REMNAWAVE_PASSWORD: ${REMNAWAVE_PASSWORD}
      REMNAWAVE_INTERNAL_SQUAD_UUIDS: ${REMNAWAVE_INTERNAL_SQUAD_UUIDS}
      REMNAWAVE_DEFAULT_TRAFFIC_LIMIT_BYTES: ${REMNAWAVE_DEFAULT_TRAFFIC_LIMIT_BYTES:-0}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
