# Сборка в GitHub Actions → ghcr.io. Если в стеке не задашь IMAGE — подставится образ этого репо.
# Переопределение: IMAGE=ghcr.io/другой/образ:тег

services:
  bot:
    image: ${IMAGE:-ghcr.io/sereza111/vpn_entrepreneur:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      BOT_TOKEN: ${BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET}
      PRIMARY_SUBSCRIPTION_SOURCE: ${PRIMARY_SUBSCRIPTION_SOURCE:-remnawave}
      # XUI_BASE_URL — хост подписки (обычно порт из «Порт подписки», напр. :2096).
      # XUI_PANEL_BASE_URL — хост панели + при необходимости секретный префикс (напр. https://ip:48408/8dFlsHsLZMTgKsrUhd), иначе POST /login даст 404.
      XUI_BASE_URL: ${XUI_BASE_URL}
      XUI_PANEL_BASE_URL: ${XUI_PANEL_BASE_URL}
      XUI_USERNAME: ${XUI_USERNAME}
      XUI_PASSWORD: ${XUI_PASSWORD}
      XUI_INBOUND_ID: ${XUI_INBOUND_ID}
      XUI_SUB_PATH: ${XUI_SUB_PATH:-/sub}
      XUI_INSECURE_TLS: ${XUI_INSECURE_TLS:-0}
      REMNAWAVE_BASE_URL: ${REMNAWAVE_BASE_URL}
      REMNAWAVE_ACCESS_TOKEN: ${REMNAWAVE_ACCESS_TOKEN}
      REMNAWAVE_BYPASS_COOKIE: ${REMNAWAVE_BYPASS_COOKIE}
      REMNAWAVE_USERNAME: ${REMNAWAVE_USERNAME}
      REMNAWAVE_PASSWORD: ${REMNAWAVE_PASSWORD}
      REMNAWAVE_INTERNAL_SQUAD_UUIDS: ${REMNAWAVE_INTERNAL_SQUAD_UUIDS}
      REMNAWAVE_DEFAULT_TRAFFIC_LIMIT_BYTES: ${REMNAWAVE_DEFAULT_TRAFFIC_LIMIT_BYTES:-0}
      REMNAWAVE_DEFAULT_HWID_DEVICE_LIMIT: ${REMNAWAVE_DEFAULT_HWID_DEVICE_LIMIT:-2}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TEST_GRANT_ENABLED: ${TEST_GRANT_ENABLED:-0}
