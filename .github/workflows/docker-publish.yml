# Сборка образа на GitHub → GitHub Container Registry (ghcr.io).
# Portainer только делает docker pull, без build на ноде (обходит ошибки BuildKit/gRPC).

name: Docker publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Имя образа в нижнем регистре (требование GHCR)
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_LC }}:latest
            ghcr.io/${{ env.IMAGE_LC }}:${{ github.sha }}
